
<!-- ============================================================
     app.component.html — Template du composant racine
     
     Structure de la page :
     ┌─────────────────────────────┐
     │  <app-header>               │  ← Navigation sticky
     ├─────────────────────────────┤
     │  <app-hero-section>         │  ← Section principale
     ├─────────────────────────────┤
     │  <app-about-section>        │  ← À propos + compétences
     ├─────────────────────────────┤
     │  <app-projects-section>     │  ← Projets réalisés
     ├─────────────────────────────┤
     │  <app-contact-section>      │  ← Formulaire de contact
     ├─────────────────────────────┤
     │  <app-footer>               │  ← Pied de page
     └─────────────────────────────┘
     ============================================================ -->

<!-- Wrapper global de l'application -->
<div class="app-wrapper">

  <!-- ── En-tête fixe avec navigation et bouton de thème ── -->
  <!-- 
    [currentTheme] : passe le thème actuel au header (pour afficher la bonne icône)
    (themeToggle)  : écoute l'événement émis par le header pour basculer le thème
  -->
  <app-header
    [currentTheme]="currentTheme"
    (themeToggle)="toggleTheme()">
  </app-header>

  <!-- ── Contenu principal de la page ── -->
  <main class="main-content" role="main">

    <!-- Section 1 : Héros / Présentation -->
    <app-hero-section></app-hero-section>

    <!-- Section 2 : À propos de moi -->
    <app-about-section></app-about-section>

    <!-- Section 3 : Mes projets -->
    <app-projects-section></app-projects-section>

    <!-- Section 4 : Contact -->
    <app-contact-section></app-contact-section>

  </main>

  <!-- ── Pied de page ── -->
  <app-footer></app-footer>

</div>
